profile: cover.out
threshold:
   file: 70
   package: 80
   total: 75
exclude:
  paths:
    - ^cmd/grc/main\.go$     # entry point — not unit-testable
    - ^pkg/github/           # GitHub API client — requires live API / mocking infrastructure
    - ^cmd/grc/sync/         # sync command — requires GitHub API token
    - ^cmd/grc/serve/git\.go$ # git exec helper — requires git repo
    - ^cmd/grc/render/yearcycle\.go$ # SVG year-cycle rendering — requires full render context
override:
  # CLI command packages: heavy integration logic, error paths require
  # complex test fixtures. Lower package threshold to 70%.
  - threshold: 70
    path: ^cmd/grc/derive$
  - threshold: 70
    path: ^cmd/grc/oscal$
  - threshold: 70
    path: ^cmd/grc/render$
  - threshold: 70
    path: ^cmd/grc/risk$
  - threshold: 65
    path: ^cmd/grc/validate$
  # Complex render orchestration and validation — many error return paths
  - threshold: 55
    path: ^cmd/grc/render/render\.go$
  - threshold: 65
    path: ^cmd/grc/validate/validate\.go$
  # Serve command — HTTP server lifecycle + git pull are integration-level
  - threshold: 30
    path: ^cmd/grc/serve$
